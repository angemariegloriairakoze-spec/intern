<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Angel's M</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, var(--primary-color), var(--primary-dark)); min-height: 100vh; display: flex; align-items: center;">
    <!-- Navigation -->
    <nav class="navbar" style="position: absolute; top: 0; left: 0; right: 0;">
        <div class="navbar-container">
            <a href="../index.html" class="navbar-brand">Angel's M</a>
            <div class="navbar-nav">
                <a href="../index.html">Home</a>
                <a href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <!-- Register Container -->
    <div class="container" style="max-width: 600px; margin-top: 80px;">
        <div class="card">
            <div class="card-header text-center">
                <h2>Create Account</h2>
                <p style="color: var(--gray-600); margin-top: 0.5rem;">Join Angel's M and start shopping or selling</p>
            </div>
            <div class="card-body">
                <!-- Error Message -->
                <div id="reg-error" class="alert alert-danger" style="display: none;"></div>

                <form onsubmit="return false;">
                    <div class="row">
                        <div class="col-6">
                            <div class="form-group">
                                <label for="reg-name" class="form-label">Full Name</label>
                                <input type="text" id="reg-name" class="form-control" placeholder="Enter your full name" required>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-group">
                                <label for="reg-email" class="form-label">Email Address</label>
                                <input type="email" id="reg-email" class="form-control" placeholder="Enter your email" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-6">
                            <div class="form-group">
                                <label for="reg-password" class="form-label">Password</label>
                                <input type="password" id="reg-password" class="form-control" placeholder="Create a password" required>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-group">
                                <label for="reg-phone" class="form-label">Phone Number</label>
                                <input type="tel" id="reg-phone" class="form-control" placeholder="Enter phone number" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-6">
                            <div class="form-group">
                                <label for="reg-gender" class="form-label">Gender</label>
                                <select id="reg-gender" class="form-control form-select" required>
                                    <option value="">Select Gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-group">
                                <label for="reg-age" class="form-label">Age</label>
                                <input type="number" id="reg-age" class="form-control" placeholder="Enter your age" min="1" max="120" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="reg-dob" class="form-label">Date of Birth</label>
                        <input type="date" id="reg-dob" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-location" class="form-label">Location</label>
                        <input type="text" id="reg-location" class="form-control" placeholder="Enter your location" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-type" class="form-label">Account Type</label>
                        <select id="reg-type" class="form-control form-select" required>
                            <option value="">Select Account Type</option>
                            <option value="customer">Customer - I want to buy products</option>
                            <option value="seller">Seller - I want to sell products</option>
                        </select>
                    </div>

                    <button type="button" id="btn-register" class="btn btn-primary w-100" onclick="register()">
                        Create Account
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p style="color: var(--gray-600);">
                        Already have an account? 
                        <a href="login.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Sign in</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Account Benefits -->
        <div class="card mt-4" style="background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);">
            <div class="card-body">
                <h4 style="color: var(--white); margin-bottom: 1rem;">Why Join Angel's M?</h4>
                <div style="color: rgba(255, 255, 255, 0.9);">
                    <div class="d-flex align-center mb-3">
                        <div style="font-size: 1.5rem; margin-right: 1rem;">✓</div>
                        <div>Access to exclusive products and deals</div>
                    </div>
                    <div class="d-flex align-center mb-3">
                        <div style="font-size: 1.5rem; margin-right: 1rem;">✓</div>
                        <div>Secure and fast checkout process</div>
                    </div>
                    <div class="d-flex align-center mb-3">
                        <div style="font-size: 1.5rem; margin-right: 1rem;">✓</div>
                        <div>Order tracking and notifications</div>
                    </div>
                    <div class="d-flex align-center">
                        <div style="font-size: 1.5rem; margin-right: 1rem;">✓</div>
                        <div>24/7 customer support</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/auth.js"></script>
    <script>
        // Check if user is already logged in
        requireGuest();

        // Set max date for date of birth (must be at least 18 years old)
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const maxDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
            document.getElementById('reg-dob').max = maxDate.toISOString().split('T')[0];
        });
    </script>
</body>
</html>
