<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Angel's M</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="navbar-brand">Angel's M</a>
            <div class="navbar-nav">
                <a href="../index.html">Home</a>
                <a href="#products">Products</a>
                <div id="nav-user-area">
                    <!-- Will be populated by auth.js -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Dashboard Container -->
    <div class="dashboard">
        <div class="container">
            <!-- Dashboard Header -->
            <div class="dashboard-header">
                <h1 id="dashboard-title">Dashboard</h1>
                <p id="dashboard-subtitle" style="color: var(--gray-600);">Manage your Angel's M account</p>
            </div>

            <!-- Dashboard Stats -->
            <div class="dashboard-stats" id="dashboard-stats">
                <!-- Stats will be populated based on user role -->
            </div>

            <!-- Main Content Area -->
            <div class="row">
                <!-- Sidebar Navigation -->
                <div class="col-3">
                    <div class="card">
                        <div class="card-header">
                            <h4>Navigation</h4>
                        </div>
                        <div class="card-body" style="padding: 0;">
                            <div id="sidebar-nav">
                                <!-- Navigation items will be populated based on user role -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-9">
                    <!-- Content will be loaded here based on active section -->
                    <div id="main-content">
                        <div class="card">
                            <div class="card-body">
                                <h3>Welcome to your Dashboard</h3>
                                <p style="color: var(--gray-600);">Select an option from the sidebar to get started.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script>
        // Check if user is authenticated
        requireLogin();

        // Dashboard state
        let currentUser = null;
        let currentSection = 'overview';

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            updateNavbar();
            currentUser = getUser();
            initializeDashboard();
        });

        function initializeDashboard() {
            if (!currentUser) return;

            // Set dashboard title based on role
            const roleTitles = {
                'admin': 'Admin Dashboard',
                'seller': 'Seller Dashboard', 
                'customer': 'Customer Dashboard'
            };
            
            document.getElementById('dashboard-title').textContent = roleTitles[currentUser.role] || 'Dashboard';
            document.getElementById('dashboard-subtitle').textContent = `Welcome back, ${currentUser.fullName}!`;

            // Load role-specific content
            loadRoleSpecificContent();
            loadDashboardStats();
            loadSidebarNavigation();
        }

        function loadRoleSpecificContent() {
            const role = currentUser.role;
            const mainContent = document.getElementById('main-content');

            switch(role) {
                case 'admin':
                    loadAdminContent();
                    break;
                case 'seller':
                    loadSellerContent();
                    break;
                case 'customer':
                    loadCustomerContent();
                    break;
                default:
                    mainContent.innerHTML = '<div class="card"><div class="card-body"><h3>Welcome</h3><p>Your role is not recognized.</p></div></div>';
            }
        }

        function loadDashboardStats() {
            const role = currentUser.role;
            const statsContainer = document.getElementById('dashboard-stats');

            switch(role) {
                case 'admin':
                    statsContainer.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-value" id="total-users">-</div>
                            <div class="stat-label">Total Users</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="total-shops">-</div>
                            <div class="stat-label">Total Shops</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="total-products">-</div>
                            <div class="stat-label">Total Products</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="total-orders">-</div>
                            <div class="stat-label">Total Orders</div>
                        </div>
                    `;
                    loadAdminStats();
                    break;
                case 'seller':
                    statsContainer.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-value" id="my-shops">-</div>
                            <div class="stat-label">My Shops</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="my-products">-</div>
                            <div class="stat-label">My Products</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="pending-orders">-</div>
                            <div class="stat-label">Pending Orders</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="total-revenue">-</div>
                            <div class="stat-label">Total Revenue</div>
                        </div>
                    `;
                    loadSellerStats();
                    break;
                case 'customer':
                    statsContainer.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-value" id="my-orders">-</div>
                            <div class="stat-label">My Orders</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="favorite-products">-</div>
                            <div class="stat-label">Favorite Products</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="pending-deliveries">-</div>
                            <div class="stat-label">Pending Deliveries</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="total-spent">-</div>
                            <div class="stat-label">Total Spent</div>
                        </div>
                    `;
                    loadCustomerStats();
                    break;
            }
        }

        function loadSidebarNavigation() {
            const role = currentUser.role;
            const sidebarNav = document.getElementById('sidebar-nav');

            let navItems = [];

            switch(role) {
                case 'admin':
                    navItems = [
                        { id: 'overview', label: 'Overview', icon: '📊' },
                        { id: 'users', label: 'Users', icon: '👥' },
                        { id: 'shops', label: 'Shops', icon: '🏪' },
                        { id: 'products', label: 'Products', icon: '📦' },
                        { id: 'orders', label: 'Orders', icon: '🛒' },
                        { id: 'notifications', label: 'Notifications', icon: '🔔' }
                    ];
                    break;
                case 'seller':
                    navItems = [
                        { id: 'overview', label: 'Overview', icon: '📊' },
                        { id: 'my-shops', label: 'My Shops', icon: '🏪' },
                        { id: 'my-products', label: 'My Products', icon: '📦' },
                        { id: 'orders', label: 'Orders', icon: '🛒' },
                        { id: 'notifications', label: 'Notifications', icon: '🔔' }
                    ];
                    break;
                case 'customer':
                    navItems = [
                        { id: 'overview', label: 'Overview', icon: '📊' },
                        { id: 'browse-products', label: 'Browse Products', icon: '🛍️' },
                        { id: 'my-orders', label: 'My Orders', icon: '🛒' },
                        { id: 'favorites', label: 'Favorites', icon: '❤️' },
                        { id: 'notifications', label: 'Notifications', icon: '🔔' }
                    ];
                    break;
            }

            sidebarNav.innerHTML = navItems.map(item => `
                <div class="nav-item" onclick="loadSection('${item.id}')" style="padding: 1rem; cursor: pointer; border-bottom: 1px solid var(--gray-200); transition: background 0.3s ease;" onmouseover="this.style.background='var(--gray-50)'" onmouseout="this.style.background='transparent'">
                    <span style="margin-right: 0.5rem;">${item.icon}</span>
                    <span>${item.label}</span>
                </div>
            `).join('');
        }

        function loadSection(sectionId) {
            currentSection = sectionId;
            const mainContent = document.getElementById('main-content');

            switch(sectionId) {
                case 'overview':
                    loadOverviewContent();
                    break;
                case 'users':
                    loadUsersContent();
                    break;
                case 'shops':
                    loadShopsContent();
                    break;
                case 'products':
                    loadProductsContent();
                    break;
                case 'my-shops':
                    loadMyShopsContent();
                    break;
                case 'my-products':
                    loadMyProductsContent();
                    break;
                case 'orders':
                    loadOrdersContent();
                    break;
                case 'my-orders':
                    loadMyOrdersContent();
                    break;
                case 'browse-products':
                    loadBrowseProductsContent();
                    break;
                case 'notifications':
                    loadNotificationsContent();
                    break;
                default:
                    mainContent.innerHTML = '<div class="card"><div class="card-body"><h3>Section not available</h3></div></div>';
            }
        }

        // Content loading functions
        function loadOverviewContent() {
            const mainContent = document.getElementById('main-content');
            const role = currentUser.role;
            
            let adminActions = '';
            if (role === 'admin') {
                adminActions = `
                    <div style="margin-top: 2rem;">
                        <h4>Admin Actions</h4>
                        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                            <button class="btn btn-primary" onclick="loadUsersContent()">
                                👥 View All Users
                            </button>
                            <button class="btn btn-secondary" onclick="loadShopsContent()">
                                🏪 View All Shops
                            </button>
                            <button class="btn btn-info" onclick="loadProductsContent()">
                                📦 View All Products
                            </button>
                            <button class="btn btn-warning" onclick="loadOrdersContent()">
                                🛒 View All Orders
                            </button>
                        </div>
                    </div>
                `;
            }
            
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3>Overview</h3>
                    </div>
                    <div class="card-body">
                        <p>Welcome to your dashboard! Here's a summary of your activity.</p>
                        ${adminActions}
                        <div style="margin-top: 2rem;">
                            <h4>Recent Activity</h4>
                            <div id="recent-activity">
                                <p style="color: var(--gray-600);">Loading recent activity...</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function loadUsersContent() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3>Users Management</h3>
                        <button class="btn btn-primary btn-sm" onclick="refreshUsers()">Refresh</button>
                    </div>
                    <div class="card-body">
                        <div id="users-list">
                            <p style="color: var(--gray-600);">Loading users...</p>
                        </div>
                    </div>
                </div>
            `;
            loadUsersList();
        }

        function loadShopsContent() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3>Shops Management</h3>
                        <button class="btn btn-primary btn-sm" onclick="refreshShops()">Refresh</button>
                    </div>
                    <div class="card-body">
                        <div id="shops-list">
                            <p style="color: var(--gray-600);">Loading shops...</p>
                        </div>
                    </div>
                </div>
            `;
            loadShopsList();
        }

        function loadProductsContent() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3>Products Management</h3>
                        <button class="btn btn-primary btn-sm" onclick="refreshProducts()">Refresh</button>
                    </div>
                    <div class="card-body">
                        <div id="products-list">
                            <p style="color: var(--gray-600);">Loading products...</p>
                        </div>
                    </div>
                </div>
            `;
            loadProductsList();
        }

        function loadMyShopsContent() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3>My Shops</h3>
                        <button class="btn btn-primary btn-sm" onclick="showCreateShopForm()">Create Shop</button>
                    </div>
                    <div class="card-body">
                        <div id="my-shops-list">
                            <p style="color: var(--gray-600);">Loading your shops...</p>
                        </div>
                    </div>
                </div>
            `;
            loadMyShopsList();
        }

        function loadMyProductsContent() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3>My Products</h3>
                        <button class="btn btn-primary btn-sm" onclick="showCreateProductForm()">Add Product</button>
                    </div>
                    <div class="card-body">
                        <div id="my-products-list">
                            <p style="color: var(--gray-600);">Loading your products...</p>
                        </div>
                    </div>
                </div>
            `;
            loadMyProductsList();
        }

        function loadOrdersContent() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3>Orders Management</h3>
                        <button class="btn btn-primary btn-sm" onclick="refreshOrders()">Refresh</button>
                    </div>
                    <div class="card-body">
                        <div id="orders-list">
                            <p style="color: var(--gray-600);">Loading orders...</p>
                        </div>
                    </div>
                </div>
            `;
            loadOrdersList();
        }

        function loadMyOrdersContent() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3>My Orders</h3>
                        <button class="btn btn-primary btn-sm" onclick="refreshMyOrders()">Refresh</button>
                    </div>
                    <div class="card-body">
                        <div id="my-orders-list">
                            <p style="color: var(--gray-600);">Loading your orders...</p>
                        </div>
                    </div>
                </div>
            `;
            loadMyOrdersList();
        }

        function loadBrowseProductsContent() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3>Browse Products</h3>
                        <input type="text" id="product-search" class="form-control" placeholder="Search products..." style="max-width: 300px;">
                    </div>
                    <div class="card-body">
                        <div id="browse-products-list" class="product-grid">
                            <p style="color: var(--gray-600);">Loading products...</p>
                        </div>
                    </div>
                </div>
            `;
            loadBrowseProductsList();
        }

        function loadNotificationsContent() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3>Notifications</h3>
                        <button class="btn btn-primary btn-sm" onclick="refreshNotifications()">Refresh</button>
                    </div>
                    <div class="card-body">
                        <div id="notifications-list">
                            <p style="color: var(--gray-600);">Loading notifications...</p>
                        </div>
                    </div>
                </div>
            `;
            loadNotificationsList();
        }

        // Data loading functions
        async function loadAdminStats() {
            try {
                const users = await api.getAllUsers();
                const shops = await api.getAllShops();
                const products = await api.getAllProducts();
                const orders = await api.getAllOrders();

                document.getElementById('total-users').textContent = users.length || 0;
                document.getElementById('total-shops').textContent = shops.length || 0;
                document.getElementById('total-products').textContent = products.length || 0;
                document.getElementById('total-orders').textContent = orders.length || 0;
            } catch (error) {
                console.error('Error loading admin stats:', error);
            }
        }

        async function loadSellerStats() {
            try {
                const shops = await api.getOwnerShops();
                const orders = await api.getSellerOrders();
                
                document.getElementById('my-shops').textContent = shops.length || 0;
                document.getElementById('pending-orders').textContent = orders.filter(o => o.status === 'pending').length || 0;
                
                // Calculate total products and revenue
                let totalProducts = 0;
                let totalRevenue = 0;
                
                for (const shop of shops) {
                    // This would need a products by shop endpoint
                    totalProducts += 0; // Placeholder
                }
                
                for (const order of orders) {
                    totalRevenue += order.totalAmount || 0;
                }
                
                document.getElementById('my-products').textContent = totalProducts;
                document.getElementById('total-revenue').textContent = `$${totalRevenue.toFixed(2)}`;
            } catch (error) {
                console.error('Error loading seller stats:', error);
            }
        }

        async function loadCustomerStats() {
            try {
                const orders = await api.getCustomerOrders();
                
                document.getElementById('my-orders').textContent = orders.length || 0;
                document.getElementById('pending-deliveries').textContent = orders.filter(o => o.status !== 'delivered').length || 0;
                
                const totalSpent = orders.reduce((sum, order) => sum + (order.totalAmount || 0), 0);
                document.getElementById('total-spent').textContent = `$${totalSpent.toFixed(2)}`;
                document.getElementById('favorite-products').textContent = '0'; // Would need favorites endpoint
            } catch (error) {
                console.error('Error loading customer stats:', error);
            }
        }

        async function loadUsersList() {
            try {
                const users = await api.getAllUsers();
                const usersList = document.getElementById('users-list');
                
                if (!users || users.length === 0) {
                    usersList.innerHTML = '<p style="color: var(--gray-600);">No users found in the system.</p>';
                    return;
                }
                
                usersList.innerHTML = `
                    <div style="margin-bottom: 1rem;">
                        <strong>Total Users:</strong> ${users.length}
                    </div>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Phone</th>
                                <th>Location</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr>
                                    <td>${user.fullName}</td>
                                    <td>${user.email}</td>
                                    <td><span class="badge bg-${user.role === 'admin' ? 'danger' : user.role === 'seller' ? 'warning' : 'primary'}">${user.role}</span></td>
                                    <td>${user.phoneNumber}</td>
                                    <td>${user.location || 'N/A'}</td>
                                    <td>
                                        <button class="btn btn-sm btn-outline" onclick="editUser('${user.id}')">Edit</button>
                                        <button class="btn btn-sm btn-danger" onclick="deleteUser('${user.id}')">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('users-list').innerHTML = '<p style="color: var(--danger-color);">Error loading users: ' + error.message + '</p>';
            }
        }

        async function loadShopsList() {
            try {
                const shops = await api.getAllShops();
                const shopsList = document.getElementById('shops-list');
                
                shopsList.innerHTML = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Owner</th>
                                <th>Contact</th>
                                <th>Location</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${shops.map(shop => `
                                <tr>
                                    <td>${shop.name}</td>
                                    <td>${shop.owner}</td>
                                    <td>${shop.contact}</td>
                                    <td>${shop.location}</td>
                                    <td>
                                        <button class="btn btn-sm btn-outline">Edit</button>
                                        <button class="btn btn-sm btn-danger">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('shops-list').innerHTML = '<p style="color: var(--danger-color);">Error loading shops</p>';
            }
        }

        async function loadProductsList() {
            try {
                const products = await api.getAllProducts();
                const productsList = document.getElementById('products-list');
                
                productsList.innerHTML = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Size</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${products.map(product => `
                                <tr>
                                    <td>${product.name}</td>
                                    <td>$${product.price}</td>
                                    <td>${product.size}</td>
                                    <td>${product.type}</td>
                                    <td><span class="badge bg-success">${product.status}</span></td>
                                    <td>
                                        <button class="btn btn-sm btn-outline">Edit</button>
                                        <button class="btn btn-sm btn-danger">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('products-list').innerHTML = '<p style="color: var(--danger-color);">Error loading products</p>';
            }
        }

        async function loadMyShopsList() {
            try {
                const shops = await api.getOwnerShops();
                const shopsList = document.getElementById('my-shops-list');
                
                if (shops.length === 0) {
                    shopsList.innerHTML = '<p style="color: var(--gray-600);">You don\'t have any shops yet. Create your first shop to get started!</p>';
                    return;
                }
                
                shopsList.innerHTML = shops.map(shop => `
                    <div class="card mb-3">
                        <div class="card-body">
                            <h4>${shop.name}</h4>
                            <p style="color: var(--gray-600);">${shop.description}</p>
                            <div style="margin-top: 1rem;">
                                <span style="margin-right: 1rem;">📞 ${shop.contact}</span>
                                <span>📍 ${shop.location}</span>
                            </div>
                            <div style="margin-top: 1rem;">
                                <button class="btn btn-sm btn-outline">Edit Shop</button>
                                <button class="btn btn-sm btn-primary">View Products</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('my-shops-list').innerHTML = '<p style="color: var(--danger-color);">Error loading your shops</p>';
            }
        }

        async function loadMyProductsList() {
            try {
                // This would need an endpoint to get products by seller
                const products = await api.getAllProducts(); // Temporary - filter by seller
                const sellerProducts = products; // Would filter here
                
                const productsList = document.getElementById('my-products-list');
                
                if (sellerProducts.length === 0) {
                    productsList.innerHTML = '<p style="color: var(--gray-600);">You don\'t have any products yet. Add your first product to get started!</p>';
                    return;
                }
                
                productsList.innerHTML = sellerProducts.map(product => `
                    <div class="card mb-3">
                        <div class="card-body">
                            <div class="d-flex justify-between align-center">
                                <div>
                                    <h4>${product.name}</h4>
                                    <p style="color: var(--gray-600);">${product.description}</p>
                                    <div style="margin-top: 0.5rem;">
                                        <span style="margin-right: 1rem;">💰 $${product.price}</span>
                                        <span style="margin-right: 1rem;">📏 ${product.size}</span>
                                        <span class="badge bg-success">${product.status}</span>
                                    </div>
                                </div>
                                <div>
                                    <button class="btn btn-sm btn-outline">Edit</button>
                                    <button class="btn btn-sm btn-danger">Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('my-products-list').innerHTML = '<p style="color: var(--danger-color);">Error loading your products</p>';
            }
        }

        async function loadOrdersList() {
            try {
                const orders = await api.getAllOrders();
                const ordersList = document.getElementById('orders-list');
                
                ordersList.innerHTML = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Product</th>
                                <th>Quantity</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${orders.map(order => `
                                <tr>
                                    <td>${order.id.substring(0, 8)}...</td>
                                    <td>${order.userId}</td>
                                    <td>${order.productId}</td>
                                    <td>${order.quantity}</td>
                                    <td>$${order.totalAmount}</td>
                                    <td><span class="badge bg-warning">${order.status || 'pending'}</span></td>
                                    <td>
                                        <button class="btn btn-sm btn-success" onclick="updateOrderStatus('${order.id}', 'approved')">Approve</button>
                                        <button class="btn btn-sm btn-danger" onclick="updateOrderStatus('${order.id}', 'denied')">Deny</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('orders-list').innerHTML = '<p style="color: var(--danger-color);">Error loading orders</p>';
            }
        }

        async function loadMyOrdersList() {
            try {
                const orders = await api.getCustomerOrders();
                const ordersList = document.getElementById('my-orders-list');
                
                if (orders.length === 0) {
                    ordersList.innerHTML = '<p style="color: var(--gray-600);">You don\'t have any orders yet. Start shopping to see your orders here!</p>';
                    return;
                }
                
                ordersList.innerHTML = orders.map(order => `
                    <div class="card mb-3">
                        <div class="card-body">
                            <div class="d-flex justify-between align-center">
                                <div>
                                    <h4>Order #${order.id.substring(0, 8)}</h4>
                                    <p style="color: var(--gray-600);">Product: ${order.productId}</p>
                                    <div style="margin-top: 0.5rem;">
                                        <span style="margin-right: 1rem;">📦 Quantity: ${order.quantity}</span>
                                        <span style="margin-right: 1rem;">💰 Total: $${order.totalAmount}</span>
                                        <span class="badge bg-info">${order.status || 'pending'}</span>
                                    </div>
                                </div>
                                <div>
                                    <button class="btn btn-sm btn-outline">View Details</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('my-orders-list').innerHTML = '<p style="color: var(--danger-color);">Error loading your orders</p>';
            }
        }

        async function loadBrowseProductsList() {
            try {
                const products = await api.getAllProducts();
                const productsList = document.getElementById('browse-products-list');
                
                productsList.innerHTML = products.map(product => `
                    <div class="product-card">
                        <div class="product-image">
                            <img src="${product.image || 'https://via.placeholder.com/300x200'}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${product.name}</h3>
                            <div class="product-price">$${product.price}</div>
                            <p class="product-description">${product.description || 'Quality product from trusted seller'}</p>
                            <button class="btn btn-primary w-100" onclick="orderProduct('${product.id}')">Order Now</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('browse-products-list').innerHTML = '<p style="color: var(--danger-color);">Error loading products</p>';
            }
        }

        async function loadNotificationsList() {
            try {
                const notifications = await api.getNotifications();
                const notificationsList = document.getElementById('notifications-list');
                
                if (notifications.length === 0) {
                    notificationsList.innerHTML = '<p style="color: var(--gray-600);">You don\'t have any notifications.</p>';
                    return;
                }
                
                notificationsList.innerHTML = notifications.map(notification => `
                    <div class="card mb-3" style="${!notification.isRead ? 'border-left: 4px solid var(--primary-color);' : ''}">
                        <div class="card-body">
                            <div class="d-flex justify-between align-center">
                                <div>
                                    <h4>${notification.title}</h4>
                                    <p style="color: var(--gray-600);">${notification.message}</p>
                                    <small style="color: var(--gray-400);">${new Date(notification.createdAt).toLocaleString()}</small>
                                </div>
                                <div>
                                    ${!notification.isRead ? '<button class="btn btn-sm btn-outline" onclick="markAsRead(\'' + notification.id + '\')">Mark as Read</button>' : ''}
                                    <button class="btn btn-sm btn-danger" onclick="deleteNotification(\'' + notification.id + '\')">Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('notifications-list').innerHTML = '<p style="color: var(--danger-color);">Error loading notifications</p>';
            }
        }

        // Action functions
        async function updateOrderStatus(orderId, status) {
            try {
                await api.updateOrderStatus(orderId, status);
                alert(`Order ${status} successfully!`);
                loadOrdersList(); // Refresh the list
            } catch (error) {
                alert(`Error updating order: ${error.message}`);
            }
        }

        async function orderProduct(productId) {
            const quantity = prompt('Enter quantity:');
            if (!quantity || quantity <= 0) return;
            
            try {
                await api.createOrderProduct({ product_id: productId, quantity: parseInt(quantity) });
                alert('Order placed successfully!');
                loadMyOrdersList(); // Refresh orders
            } catch (error) {
                alert(`Error placing order: ${error.message}`);
            }
        }

        async function markAsRead(notificationId) {
            try {
                await api.markNotificationRead(notificationId);
                loadNotificationsList(); // Refresh notifications
            } catch (error) {
                console.error('Error marking notification as read:', error);
            }
        }

        async function deleteNotification(notificationId) {
            if (!confirm('Are you sure you want to delete this notification?')) return;
            
            try {
                await api.deleteNotification(notificationId);
                loadNotificationsList(); // Refresh notifications
            } catch (error) {
                console.error('Error deleting notification:', error);
            }
        }

        // Refresh functions
        function refreshUsers() { loadUsersList(); }
        function refreshShops() { loadShopsList(); }
        function refreshProducts() { loadProductsList(); }
        function refreshOrders() { loadOrdersList(); }
        function refreshMyOrders() { loadMyOrdersList(); }
        function refreshNotifications() { loadNotificationsList(); }

        // Form functions (placeholders)
        function showCreateShopForm() {
            alert('Create Shop form - This would open a modal or navigate to a create shop page');
        }

        function showCreateProductForm() {
            alert('Create Product form - This would open a modal or navigate to a create product page');
        }

        // Load overview by default
        loadOverviewContent();
    </script>
</body>
</html>
